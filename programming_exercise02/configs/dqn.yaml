device: cpu

env:
  name: LunarLander-v3

logging:
  project: dqn-lunar-lander

collector:
  total_frames: 500_000
  frames_per_batch: 1000
  init_random_frames: 10_000

buffer:
  buffer_size: 100_000
  batch_size: 128

optim:
  lr: 2.5e-4
  tau: 0.005  # TODO: Implement soft target network updates

loss:
  gamma: 0.99
  num_updates: 100

exploration:
  eps_start_value: 1.0  # TODO: Implement epsilon-greedy action selection
  eps_end_value: 0.025  # TODO: Implement epsilon-greedy action selection
  eps_anneal_steps: 500_000 # TODO: Implement epsilon-greedy action selection

evaluation:
  eval_step_freq: 10000
  episodes: 10