device: cpu
env:
  name: LunarLander-v3
logging:
  project: dqn-lunar-lander
collector:
  total_frames: 500000
  frames_per_batch: 1000
  init_random_frames: 10000
buffer:
  buffer_size: 100000
  batch_size: 128
optim:
  lr: 0.00025
  tau: 0.005
loss:
  gamma: 0.99
  num_updates: 100
exploration:
  eps_start_value: 1.0
  eps_end_value: 0.025
  eps_anneal_steps: 500000
evaluation:
  eval_step_freq: 10000
  episodes: 10
